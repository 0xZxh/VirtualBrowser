<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover"
    />
    <meta name="theme-color" content="#0f172a" />
    <title>远程建档 · 指纹浏览器</title>
    <link rel="stylesheet" href="./app.css" />
  </head>
  <body>
    <div id="app">
      <header class="top">
        <div class="brand">指纹浏览器</div>
        <div id="userBar" class="user-bar hidden">
          <span id="userName"></span>
          <button type="button" id="btnLogout" class="link">退出</button>
        </div>
      </header>

      <main>
        <section id="loginView" class="card">
          <h1>账号登录</h1>
          <p class="hint">使用管理端账号登录后可远程创建浏览器环境</p>
          <label>
            账号
            <input id="username" autocomplete="username" placeholder="admin" />
          </label>
          <label>
            密码
            <input id="password" type="password" autocomplete="current-password" placeholder="••••••" />
          </label>
          <button type="button" id="btnLogin" class="primary">登录</button>
          <p id="loginError" class="error"></p>
        </section>

        <section id="createView" class="card hidden">
          <h1>创建浏览器</h1>
          <p class="hint">指纹由服务端自动生成；启动页默认京东到家门店</p>
          <label>
            名称 <span class="req">*</span>
            <input id="envName" placeholder="例如：江西小炒中心店" />
          </label>
          <label>
            分组
            <input id="envGroup" placeholder="默认分组" value="默认分组" />
          </label>
          <label>
            启动主页
            <input id="envHomepage" value="https://store.jddj.com/" />
          </label>
          <label>
            Cookie（可选）
            <textarea
              id="envCookie"
              rows="6"
              placeholder="支持 JSON 数组，或直接粘贴 a=1; b=2 Cookie 头"
            ></textarea>
          </label>
          <button type="button" id="btnCreate" class="primary">创建</button>
          <p id="createMsg" class="msg"></p>
        </section>
      </main>
    </div>
    <script src="./cookie-parse.js"></script>
    <script src="./app.js"></script>
  </body>
</html>
